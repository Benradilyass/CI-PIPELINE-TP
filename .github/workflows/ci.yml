name: Simple Pipline
on:
  push :
    branches: [main]
  pull_request :
    branches: [main] 
  workflow_dispatch:  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version : "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install linter flake8
        run: pip install flake8
      - name: Run the linter
        run: |
          flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics
      - name: Lunch the test 
        run: pytest -v --cov=app