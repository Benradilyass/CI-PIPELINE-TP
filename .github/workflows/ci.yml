name: Simple Pipline
on:
  push :
    branches: [main]
  pull_request :
    branches: [main] 
  workflow_dispatch:  
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version : "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install linter flake8
        run: pip install flake8
      - name: Run the linter
        run: |
          flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version : "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lunch the test 
        run: pytest tests/ -v --cov=src
        env:
          PYTHONPATH: ${{ github.workspace }}
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build the package
        run: python -m build

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
      